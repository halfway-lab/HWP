name: Publish Reading Note

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: packages/reading-note

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: packages/reading-note/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: |
          npm run build
          npm test
          npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
